<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlgoScape - Intelligent Path Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron',sans-serif;
    background:#050816;
    overflow-x:hidden;
    color:white;
}

/* ===== Animated Background ===== */

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
    will-change:contents;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#00ffff22,transparent 20%),
    radial-gradient(circle at bottom right,#00ff9922,transparent 20%);
    z-index:-2;
    pointer-events:none;
}

/* ===== Mobile Responsiveness ===== */

@media(max-width:768px){
    .title h1{
        font-size:2rem;
    }

    .cell{
        width:40px;
        height:40px;
    }

    .controls{
        grid-template-columns:1fr;
    }
}

@media(max-width:480px){
    .title h1{
        font-size:1.5rem;
    }

    .cell{
        width:35px;
        height:35px;
    }

    .container{
        padding:10px;
    }
}

/* ===== Layout ===== */

.container{
    width:95%;
    max-width:1500px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    margin-bottom:20px;
    animation:fadeIn 1.2s ease-out;
}

.title h1{
    font-size:3rem;
    color:#00ffff;
    text-shadow:0 0 20px cyan;
    transition:all 0.3s ease;
    animation:titleGlow 2s ease-in-out infinite;
}

.title h1:hover{
    text-shadow:0 0 40px cyan, 0 0 60px #00ffff;
    transform:scale(1.02);
}

.title p{
    color:#9fdfff;
    margin-top:10px;
    animation:fadeIn 1.5s ease-out;
    transition:all 0.3s ease;
}

@keyframes titleGlow{
    0%,100%{
        text-shadow:0 0 20px cyan;
    }
    50%{
        text-shadow:0 0 30px cyan, 0 0 40px #00ffff;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

/* ===== Controls ===== */

.controls{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.1);
    animation:slideInUp 0.6s ease-out;
    transition:all 0.3s ease;
}

.card:hover{
    background:rgba(255,255,255,0.08);
    border-color:rgba(0,255,255,0.3);
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    transform:translateY(-4px);
}

@keyframes slideInUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card h2{
    margin-bottom:15px;
    color:#00ffff;
}

input, textarea, button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-family:'Orbitron',sans-serif;
    transition:all 0.3s ease;
}

input, textarea{
    background:#0f172a;
    color:white;
    border:1px solid rgba(0,255,255,0.2);
}

input:focus, textarea:focus{
    outline:none;
    background:#1a2b4a;
    border-color:rgba(0,255,255,0.6);
    box-shadow:0 0 15px rgba(0,255,255,0.2);
    transform:scale(1.02);
}

textarea{
    min-height:150px;
    resize:none;
}

button{
    background:linear-gradient(45deg,#00ffff,#00ff99);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change:transform,box-shadow;
}

button:hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:0 8px 20px rgba(0,255,255,0.4);
}

button:active{
    transform:scale(0.98) translateY(0);
}

/* ===== Grid ===== */

.grid-container{
    display:flex;
    justify-content:center;
    margin-top:30px;
    animation:fadeIn 0.8s ease-out;
}

.grid{
    display:grid;
    gap:6px;
    animation:scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes scaleIn{
    from{
        opacity:0;
        transform:scale(0.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.cell{
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:#101b34;
    border:1px solid #1e3a5f;
    transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-weight:bold;
    will-change:transform,background,box-shadow,border-color;
    backface-visibility:hidden;
}

.cell:hover{
    border-color:rgba(0,255,255,0.5);
    transform:scale(1.05);
}

.start{
    background:#00bfff;
    box-shadow:0 0 20px #00bfff;
    animation:pulse 2s ease-in-out infinite;
}

.end{
    background:#00ff99;
    box-shadow:0 0 20px #00ff99;
    animation:pulse 2s ease-in-out infinite;
}

.current{
    background:yellow;
    color:black;
    transform:scale(1.15);
    box-shadow:0 0 25px yellow;
    animation:pulse 0.6s ease-in-out infinite;
}

.visited{
    background:#2563eb;
    box-shadow:0 0 10px #2563eb;
    animation:fadeIn 0.4s ease;
}

.path{
    background:#00ff99;
    color:black;
    box-shadow:0 0 20px #00ff99;
    animation:pathGlow 0.5s ease;
}

@keyframes pulse{
    0%,100%{
        box-shadow:0 0 20px currentColor;
        transform:scale(1);
    }
    50%{
        box-shadow:0 0 30px currentColor;
        transform:scale(1.1);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes pathGlow{
    from{
        opacity:0;
        box-shadow:0 0 5px #00ff99;
    }
    to{
        opacity:1;
        box-shadow:0 0 20px #00ff99;
    }
}

/* ===== Stats ===== */

.stats{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.stat{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    text-align:center;
    animation:slideInUp 0.6s ease-out;
    transition:all 0.3s ease;
    border:1px solid rgba(0,255,255,0.1);
}

.stat:hover{
    background:rgba(255,255,255,0.08);
    border-color:rgba(0,255,255,0.3);
    box-shadow:0 0 20px rgba(0,255,255,0.15);
    transform:translateY(-4px);
}

.stat h3{
    color:#00ffff;
    margin-bottom:10px;
    transition:all 0.3s ease;
}

.stat p{
    font-size:1.5rem;
    font-weight:bold;
    color:#00ff99;
    transition:all 0.3s ease;
}

/* ===== Intro ===== */

.intro{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#000000,#050816);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    flex-direction:column;
    animation:fadeOut 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    pointer-events:none;
}

.intro h1{
    color:#00ffff;
    font-size:2rem;
    animation:glitch 1s infinite, slideDown 0.8s ease-out;
    text-shadow:0 0 20px #00ffff;
}

@keyframes glitch{
    0%{transform:translateX(0)}
    20%{transform:translateX(-2px) skewX(-0.5deg)}
    40%{transform:translateX(2px) skewX(0.5deg)}
    60%{transform:translateX(-2px) skewX(-0.5deg)}
    80%{transform:translateX(2px) skewX(0.5deg)}
    100%{transform:translateX(0)}
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeOut{
    0%,75%{opacity:1;visibility:visible}
    100%{
        opacity:0;
        visibility:hidden;
    }
}

</style>
</head>
<body>

<div class="intro">
    <h1>INITIALIZING DIJKSTRA ENGINE...</h1>
</div>

<canvas id="bg"></canvas>

<div class="container">

    <div class="title">
        <h1>AlgoScape</h1>
        <p>Interactive DAA Path Finding Visualization</p>
    </div>

    <div class="controls">

        <div class="card">
            <h2>Grid Size</h2>

            <input type="number" id="rows" placeholder="Rows">
            <input type="number" id="cols" placeholder="Columns">

            <button onclick="generateGrid()">
                Generate Grid
            </button>
        </div>

        <div class="card">
            <h2>Enter Grid Values</h2>

            <textarea id="gridInput"
placeholder="Example:

1 2 3
4 5 6
7 8 9"></textarea>

            <button onclick="startDijkstra()">
                Start Visualization
            </button>
        </div>

    </div>

    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <div class="stats">

        <div class="stat">
            <h3>Visited Nodes</h3>
            <p id="visited">0</p>
        </div>

        <div class="stat">
            <h3>Total Cost</h3>
            <p id="cost">0</p>
        </div>

        <div class="stat">
            <h3>Path Length</h3>
            <p id="pathLength">0</p>
        </div>

    </div>

</div>

<script>

/* ===== Animated Background ===== */

const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d',{alpha:true});

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
let animationId=null;

for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.5+0.5,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5,
        opacity:Math.random()*0.5+0.3
    });
}

function animateBG(){
    ctx.fillStyle='rgba(5,8,22,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,255,255,${p.opacity})`;
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;
        p.opacity+=Math.random()*0.02-0.01;
        p.opacity=Math.max(0.1,Math.min(0.7,p.opacity));

        if(p.x<-10) p.x=canvas.width+10;
        if(p.x>canvas.width+10) p.x=-10;
        if(p.y<-10) p.y=canvas.height+10;
        if(p.y>canvas.height+10) p.y=-10;
    });

    animationId=requestAnimationFrame(animateBG);
}

animateBG();

/* ===== Grid Logic ===== */

let ROWS=0;
let COLS=0;
let weights=[];
let cells=[];

function generateGrid(){
    try{
        const rowsInput=document.getElementById('rows').value.trim();
        const colsInput=document.getElementById('cols').value.trim();

        if(!rowsInput || !colsInput){
            alert('Please enter both rows and columns');
            return;
        }

        ROWS=parseInt(rowsInput);
        COLS=parseInt(colsInput);

        if(ROWS<=0 || COLS<=0 || ROWS>20 || COLS>20){
            alert('Rows and columns must be between 1 and 20');
            return;
        }

        const grid=document.getElementById('grid');
        grid.innerHTML='';
        grid.style.gridTemplateColumns=`repeat(${COLS},50px)`;
        grid.style.opacity='0';

        cells=[];

        for(let i=0;i<ROWS*COLS;i++){
            const cell=document.createElement('div');
            cell.className='cell';
            cell.innerText='0';
            grid.appendChild(cell);
            cells.push(cell);
        }

        requestAnimationFrame(()=>{
            grid.style.transition='opacity 0.3s ease';
            grid.style.opacity='1';
        });

    }catch(e){
        console.error('Error generating grid:',e);
        alert('Error generating grid. Please check your input.');
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

async function startDijkstra(){
    try{
        if(ROWS===0 || COLS===0){
            alert('Please generate a grid first');
            return;
        }

        const input=document.getElementById('gridInput').value.trim();

        if(!input){
            alert('Please enter grid values');
            return;
        }

        const rows=input.split('\n');
        weights=[];

        rows.forEach(r=>{
            r.split(' ').forEach(v=>{
                const parsed=parseInt(v);
                if(!isNaN(parsed)){
                    weights.push(parsed);
                }
            });
        });

        if(weights.length!==ROWS*COLS){
            alert(`Expected ${ROWS*COLS} values, got ${weights.length}`);
            return;
        }

        for(let i=0;i<weights.length;i++){
            cells[i].innerText=weights[i];
        }

        const size=ROWS*COLS;
        const dist=new Array(size).fill(Infinity);
        const prev=new Array(size).fill(null);
        const visited=new Set();

        dist[0]=weights[0];
        const pq=[{node:0,cost:weights[0]}];

        function neighbors(index){
            const arr=[];
            const row=Math.floor(index/COLS);
            const col=index%COLS;

            if(row>0) arr.push(index-COLS);
            if(row<ROWS-1) arr.push(index+COLS);
            if(col>0) arr.push(index-1);
            if(col<COLS-1) arr.push(index+1);

            return arr;
        }

        cells[0].classList.add('start');
        cells[size-1].classList.add('end');

        let visitedCount=0;
        const animationSpeed=250;

        while(pq.length){
            pq.sort((a,b)=>a.cost-b.cost);
            const current=pq.shift();
            const node=current.node;

            if(visited.has(node)) continue;

            visited.add(node);
            visitedCount++;

            document.getElementById('visited').innerText=visitedCount;

            if(node!==0 && node!==size-1){
                cells[node].classList.add('current');
            }

            await sleep(animationSpeed);

            if(node!==0 && node!==size-1){
                cells[node].classList.remove('current');
                cells[node].classList.add('visited');
            }

            if(node===size-1) break;

            for(let n of neighbors(node)){
                if(visited.has(n)) continue;

                const newDist=dist[node]+weights[n];

                if(newDist<dist[n]){
                    dist[n]=newDist;
                    prev[n]=node;
                    pq.push({node:n,cost:newDist});
                }
            }
        }

        let path=[];
        let temp=size-1;

        while(temp!==null){
            path.push(temp);
            temp=prev[temp];
        }

        path.reverse();

        for(let p of path){
            if(p!==0 && p!==size-1){
                cells[p].classList.remove('visited');
                cells[p].classList.add('path');
                await sleep(150);
            }
        }

        document.getElementById('cost').innerText=dist[size-1]===Infinity?'N/A':dist[size-1];
        document.getElementById('pathLength').innerText=path.length;

    }catch(e){
        console.error('Error running Dijkstra:',e);
        alert('Error running algorithm. Please check your input.');
    }
}

/* ===== Responsive Canvas ===== */

let resizeTimeout=null;

window.addEventListener('resize',()=>{
    clearTimeout(resizeTimeout);
    resizeTimeout=setTimeout(()=>{
        canvas.width=innerWidth;
        canvas.height=innerHeight;
    },150);
});

/* ===== Performance Optimization ===== */

document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
        cancelAnimationFrame(animationId);
    }else{
        animateBG();
    }
});

</script>

</body>
</html>
